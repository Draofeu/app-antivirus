<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield Mobile</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e94560">

    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .card { background: #16213e; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); max-width: 400px; margin: auto; }
        button { background: #e94560; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        #result { margin-top: 20px; text-align: left; font-size: 14px; word-break: break-all; }
        .danger { color: #ff4d4d; font-weight: bold; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 5px; }
        .safe { color: #4dff88; background: rgba(0,255,0,0.1); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🛡️ CyberShield</h1>
        <p>Scanner anti-virus mobile</p>
        
        <input type="file" id="fileInput" style="display: none;">
        <button onclick="document.getElementById('fileInput').click()">Analyser un fichier</button>
        
        <div id="result"></div>
    </div>

    <script>
        // LIEN N°2 : Enregistrement du Service Worker (pour le mode hors-ligne)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log("Lien établi avec sw.js !"))
                .catch(err => console.log("Échec du lien avec sw.js", err));
            });
        }


// Base de données des 10 menaces célèbres (Signatures SHA-256)
        const BLACKLIST = {
            // Emotet (Botnet très dangereux)
            "432c668b8e0b686b245a6c3f6834e0227181f9b3b89552178d8a7c293674681a": "Trojan.Emotet",
            
            // Wannacry (Le célèbre Ransomware)
            "24d00b57954f4e6704064798c1491ba366c055e900a3908b350699047970d47d": "Ransomware.WannaCry",
            
            // Agent Tesla (Spyware qui vole les mots de passe)
            "6016626966150249826372f883f3e1858f918451b759325988e401ec86d6f284": "Spyware.AgentTesla",
            
            // Formbook (Voleur de données)
            "4439c36640c542194b1509355153285c5484a0d9b4b02554e2f3922d4f20b8f4": "Trojan.Formbook",
            
            // Lokibot (Infostealer)
            "9904944917a1a011210817c75a40a233543d3950ee03328e19c0b560a699863c": "Stealer.LokiBot",
            
            // Nanocore RAT (Outil de contrôle à distance malveillant)
            "2764ecf393b4999a4e4be9348c407841961e9389a9f993d39695679905953503": "RAT.NanoCore",
            
            // Remcos RAT (Souvent utilisé pour l'espionnage)
            "7a57c5a07c1303866d92e59146f363c457d4764d84a7e94f8774e1d305609462": "RAT.Remcos",
            
            // GuLoader (Téléchargeur de malwares)
            "f2385108f97e68270502b48a80447361955b206771e846059d6092049d59046c": "Downloader.GuLoader",
            
            // Quakbot (Cheval de Troie bancaire)
            "18b8f2d6e3552086c8721c000e30d07525f23594738546b858e937d578ec09f0": "Banker.Qakbot",
            
            // IcedID (Ciblage des entreprises)
            "b697331908e33230678d91295b92209d8569528f8928374a26084a9e2d312275": "Trojan.IcedID"
        };


        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const resDiv = document.getElementById('result');
            resDiv.innerHTML = "Analyse en cours...";

            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const fileHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Vérification améliorée
            if (fileHash in BLACKLIST) {
                const virusName = BLACKLIST[fileHash];
                resDiv.innerHTML = `<div class="danger">⚠️ MENACE DÉTECTÉE !<br>Type : ${virusName}</div>`;
            } else {
                resDiv.innerHTML = `<div class="safe">✅ AUCUN VIRUS CONNU<br>Le fichier semble sain dans notre base.</div>`;
            }

        });
    </script>
    <div class="card" style="margin-top: 20px;">
   <h1> IA Detector</h1>
   <p>Analyse d'authenticité d'image</p>
   
   <input type="file" id="iaInput" accept="image/*" style="display: none;">
   <button onclick="document.getElementById('iaInput').click()" style="background: #4dff88; color: #1a1a2e;">Analyser une photo</button>
   
   <div id="iaResult" style="margin-top: 20px; text-align: left; font-size: 14px;"></div>
</div>

<script>
   // --- PARTIE DÉTECTION IA ---
   document.getElementById('iaInput').addEventListener('change', async function(e) {
       const file = e.target.files[0];
       if (!file) return;

       const resDiv = document.getElementById('iaResult');
       resDiv.innerHTML = "ðŸ” Analyse visuelle et recherche contextuelle...";

       // 1. Simulation d'Analyse Visuelle (Algorithme de détection d'artefacts)
       // Dans une vraie app, on enverrait le 'file' à un serveur avec TensorFlow ou un modèle spécialisé
       const visualAnalysis = await simulateVisualAIAnalysis(file);

       // 2. Simulation de Recherche d'Information (API Reverse Image Search)
       const webAnalysis = await simulateWebSearch(file);

       // Affichage des résultats combinés
       let finalHTML = `<strong>Résultats de l'analyse :</strong><br><br>`;
       
       finalHTML += visualAnalysis.isAI 
           ? `<div class="danger"> Indices d'IA détectés (${visualAnalysis.confidence}%) : ${visualAnalysis.details}</div>`
           : `<div class="safe"> Structure de pixels naturelle détectée.</div>`;

       finalHTML += `<br>`;

       finalHTML += webAnalysis.found 
           ? `<div class="danger">”— Source identifiée : Trouvé sur des banques d'images IA.</div>`
           : `<div class="safe"> Aucune occurrence suspecte sur le web.</div>`;

       resDiv.innerHTML = finalHTML;
   });

   // Fonction simulée pour l'analyse visuelle (Explications pour l'étape suivante)
   async function simulateVisualAIAnalysis(file) {
       // Ici, on devrait appeler une API comme Sightengine ou Hive Moderation
       return new Promise(resolve => {
           setTimeout(() => {
               resolve({
                   isAI: true,
                   confidence: 88,
                   details: "Anomalies dans les textures de peau et arrière-plan trop lisse."
               });
           }, 1500);
       });
   }

   // Fonction simulée pour la recherche web
   async function simulateWebSearch(file) {
       // Ici, on appellerait une API de recherche inversée (ex: SerpApi)
       return new Promise(resolve => {
           setTimeout(() => {
               resolve({ found: false });
           }, 2000);
       });
   }
</script>
</body>
</html>
